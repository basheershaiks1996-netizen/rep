<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Intraday Screener</title><link rel="stylesheet" href="/static/style.css?v=5"></head>
<body>
<header class="topbar"><div class="brand"><h1>Intraday Screener</h1><div id="latest-db" class="db-stamp">Latest DB: -</div></div>
<div class="header-actions"><div class="search-wrap"><input id="search" placeholder="Search stocks..."><button id="clear-search" type="button" aria-label="Clear search">×</button></div><button id="refresh">↻</button></div></header>
<main>
<section class="heading"><div class="tabs" role="tablist"><button class="tab active" data-view="ltp" role="tab" aria-selected="true">LTP</button><button class="tab" data-view="orb" role="tab" aria-selected="false">ORB</button></div><span id="status">Loading...</span></section>
<section class="filters">
<div class="filter-field"><select id="price"><option value="">Price Change %</option><option value="1">&gt; 1%</option><option value="2">&gt; 2%</option><option value="5">&gt; 5%</option><option value="-1">&lt; -1%</option></select><label for="price">Price Change %</label></div>
<div class="filter-field"><select id="rsi"><option value="">RSI</option><option value="70">&gt; 70</option><option value="60">&gt; 60</option><option value="50">50-70</option><option value="30">&lt; 30</option></select><label for="rsi">RSI</label></div>
<div class="filter-field"><select id="adx"><option value="">ADX</option><option value="20">&gt; 20</option><option value="25">&gt; 25</option><option value="40">&gt; 40</option></select><label for="adx">ADX</label></div>
<div class="filter-field"><select id="cci"><option value="">CCI</option><option value="100">&gt; 100</option><option value="200">&gt; 200</option><option value="-100">&lt; -100</option></select><label for="cci">CCI</label></div>
<div class="filter-field"><select id="macd"><option value="">MACD Histogram</option><option value="positive">Positive</option><option value="negative">Negative</option></select><label for="macd">MACD Histogram</label></div>
<div class="filter-field"><select id="cpr"><option value="">CPR</option><option>Narrow</option><option>Normal</option><option>Wide</option></select><label for="cpr">CPR</label></div>
<div class="filter-field"><select id="virgin_cpr"><option value="">Virgin CPR</option><option value="1">True</option><option value="0">False</option></select><label for="virgin_cpr">Virgin CPR</label></div>
<button id="clear">Clear all</button></section>
<div class="info"><span id="count"></span><span id="dbinfo"></span></div>
<div class="table"><table><thead><tr>
<th>Symbol</th><th data-sort="price">Price ↕</th><th data-sort="price_change">Price Change % ↕</th>
<th data-sort="prevhigh">Prev High ↕</th><th data-sort="prevlow">Prev Low ↕</th><th>R1</th><th>S1</th><th data-sort="RSI">RSI ↕</th><th data-sort="ADX">ADX ↕</th><th data-sort="CCI">CCI ↕</th>
<th data-sort="macd_histogram">MACD ↕</th><th>CPR</th><th>V-CPR</th><th data-sort="volume">Volume ↕</th>
</tr></thead><tbody id="body"></tbody></table></div>
</main><script src="/static/app.js?v=10"></script></body></html>
